name: Update CRAN Coverage
on:
  workflow_dispatch:
    inputs:
      time_budget_seconds:
        description: "Stop starting new shards after this many seconds."
        default: "18000"
  schedule:
    # Every 6 hours: keep collecting, and relaunch soon after a run ends or a
    # job goes down. A run is budget-bounded (~5h) so runs do not overlap; the
    # collection is resumable, so each run picks up where the last one stopped.
    - cron: "0 */6 * * *"
concurrency:
  # Serialize whole workflow runs (all matrix legs + merge) across scheduled
  # ticks so two runs never write the releases at once.
  group: cran-coverage-update
  cancel-in-progress: false
permissions:
  contents: write
env:
  # Matrix width for parallel collection. Start narrow; widening later is safe
  # (runners with no shard asset self-seed their slice from the canonical DB).
  # Keep this in sync with the collect job's matrix.index list.
  SHARD_COUNT: "4"
  # The public release consumers read: canonical database + summary only.
  PUBLIC_TAG: current
  # A hidden prerelease holding the pipeline's internal state (per-runner shard
  # databases and raw covr objects), so the public release stays clean.
  INTERNAL_TAG: internal
  # Install R package dependencies from a dated Posit PPM Ubuntu-noble binary
  # snapshot instead of the rolling r2u apt repo, so binaries are always built
  # against the pinned R and never drift out of ABI with it. Bump the date
  # deliberately (in step with the pinned image digest below) to move forward.
  PACKAGE_SOURCE: ppm
  PPM_SNAPSHOT: "2026-07-01"
jobs:
  # Make sure both releases exist before the matrix fans out, so the runners do
  # not race to create them.
  bootstrap:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Ensure the public and internal releases exist
        run: |
          set -uo pipefail
          # `gh release view` exits non-zero for BOTH "release absent" (404) and
          # any transient API error (403 rate limit, 5xx). The old
          # `if gh release view >/dev/null 2>&1` conflated them: on a 403 it took
          # the else branch and ran `gh release create` on a release that already
          # exists, whose own 403 then failed the whole run. The 403 tail of the
          # previous scheduled run's upload burst is exactly when this fires.
          # Branch on the HTTP status instead -- only a real 404 creates -- and
          # back off and retry a transient status so a drained per-repo API
          # budget does not fail bootstrap.
          ensure_release() {
            tag="$1"; shift
            for attempt in 1 2 3 4 5 6; do
              status=$(gh api -i "repos/${GH_REPO}/releases/tags/${tag}" 2>/dev/null | awk 'NR==1{print $2}')
              case "${status:-none}" in
                200) echo "release '${tag}' already exists"; return 0 ;;
                404) echo "creating release '${tag}'"
                     if gh release create "$tag" "$@"; then return 0; fi
                     echo "create failed for '${tag}'; re-checking" ;;
                *)   echo "transient status '${status:-none}' for '${tag}' (attempt ${attempt}); backing off" ;;
              esac
              if [ "$attempt" -lt 6 ]; then sleep $((attempt * 60)); fi
            done
            echo "could not confirm release '${tag}' exists after retries" >&2
            return 1
          }
          ensure_release "$PUBLIC_TAG" --target "$GITHUB_SHA" \
            --title "CRAN Coverage (rolling)" \
            --notes "Latest-version test coverage for CRAN packages." --latest || exit 1
          ensure_release "$INTERNAL_TAG" --target "$GITHUB_SHA" \
            --title "CRAN Coverage (internal state)" \
            --notes "Per-runner shard databases and raw covr objects. Pipeline internals; not for direct use. Consumers should read cran-coverage.db on the 'current' release." \
            --prerelease || exit 1

  collect:
    needs: bootstrap
    runs-on: ubuntu-latest
    container:
      # Pinned by digest so the base R stays fixed (paired with the PPM snapshot
      # date above); this is what removes the rolling-image ABI drift. Bump the
      # digest and PPM_SNAPSHOT together. This digest is rocker/r2u:noble = R 4.6.1.
      image: rocker/r2u:noble@sha256:816279dd028627eef4c06416a25fb47f8943bab5f505f81510db55d5386667c5
      # Coarse container memory cap: a runaway untrusted test suite is killed
      # rather than taking down the runner. Per-unit hangs are bounded
      # separately by the covr subprocess timeout (PER_UNIT_TIMEOUT_S).
      options: --memory=14g
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        index: [0, 1, 2, 3]
    env:
      GH_REPO: ${{ github.repository }}
      SHARD_INDEX: ${{ matrix.index }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: System tools + R toolchain from PPM
        run: |
          set -euo pipefail
          echo "runner: $(nproc) cores, $(free -h 2>/dev/null | awk '/^Mem/{print $2}') RAM"
          R --version | head -1
          apt-get update -qq || true
          # System tools + the build toolchain covr needs to recompile the target
          # from source. R packages come from the pinned PPM snapshot (below),
          # not apt, so their binaries are built against this exact R -- no
          # rolling-image ABI drift, so no source-rebuild heal is needed.
          apt-get install -y --no-install-recommends git curl gh jq \
            pkg-config libcurl4-openssl-dev libssl-dev libxml2-dev
          # covr toolchain from the pinned PPM snapshot. The covr subprocess
          # installs each target's dependencies from the same snapshot
          # (PACKAGE_SOURCE=ppm), and install_sysreqs pre-seeds the whole
          # dependency tree's system libraries via apt (PPM binaries, unlike r2u,
          # do not carry them).
          Rscript -e '
            source("scripts/config.R"); source("scripts/coverage.R")
            cat("PPM:", use_ppm_source(), "| R", as.character(getRversion()), "\n")
            install.packages(c("covr","testthat","DBI","RSQLite","callr",
                               "jsonlite","pkgdepends"))
            need <- c("covr","testthat","DBI","RSQLite","callr","jsonlite","pkgdepends")
            ok <- vapply(need, requireNamespace, logical(1), quietly = TRUE)
            print(ok)
            if (!all(ok)) { cat("FAIL: a toolchain package did not install/load\n"); quit(status = 1) }
          '
      - name: Download this runner's prior state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p out out/raw
          SHARD_ASSET="cran-coverage-shard-${SHARD_INDEX}.db"
          PRIOR_ROWS=0
          # Read asset lists into variables first: with -e, a transient
          # `gh release view` failure aborts the step (the run just retries next
          # tick) instead of being misread as "no prior state" and restarting.
          ASSETS_INT=$(gh release view "$INTERNAL_TAG" --json assets -q '.assets[].name')
          ASSETS_PUB=$(gh release view "$PUBLIC_TAG" --json assets -q '.assets[].name')
          # Resume state (shard database) lives on the internal prerelease.
          if echo "$ASSETS_INT" | grep -qx "$SHARD_ASSET"; then
            gh release download "$INTERNAL_TAG" --pattern "$SHARD_ASSET" --dir out
            mv "out/$SHARD_ASSET" out/cran-coverage.db
            PRIOR_ROWS=$(Rscript -e 'source("scripts/export.R"); cat(summary_row_count("out/cran-coverage.db"))')
            if [ "$PRIOR_ROWS" -eq 0 ]; then
              # The published shard is fine (only the merge writes it, guarded),
              # so an empty read here is a transient bad download. Discard it and
              # re-seed from the canonical below rather than failing the job; that
              # sets PRIOR_ROWS from banked coverage, so publish still cannot
              # clobber the good shard with a smaller one.
              echo "prior shard DB downloaded empty/unreadable; re-seeding this partition from the canonical"
              rm -f out/cran-coverage.db
            fi
          fi
          # Cutover / self-heal: no usable shard DB, but the canonical exists.
          # Seed this runner from just its partition of the canonical so it
          # resumes instead of recomputing coverage we already have.
          if [ "$PRIOR_ROWS" -eq 0 ] && echo "$ASSETS_PUB" | grep -qx cran-coverage.db; then
            gh release download "$PUBLIC_TAG" --pattern cran-coverage.db --dir canon
            PRIOR_ROWS=$(Rscript -e '
              for (s in c("config.R","export.R","update.R")) source(file.path("scripts", s))
              cat(subset_partition("canon/cran-coverage.db", "out/cran-coverage.db",
                                   as.integer(Sys.getenv("SHARD_INDEX")),
                                   as.integer(Sys.getenv("SHARD_COUNT"))))')
            echo "seeded shard ${SHARD_INDEX} from the canonical DB: ${PRIOR_ROWS} rows"
          fi
          echo "$PRIOR_ROWS" > out/.prior_rows
          # Raw covr objects for this runner also live on the internal prerelease
          # (best-effort; never destructive to the DB).
          mkdir -p out/rawbundles
          gh release download "$INTERNAL_TAG" --pattern "covr-raw-s${SHARD_INDEX}-*.tar.gz" --dir out/rawbundles 2>/dev/null || true
          for f in out/rawbundles/covr-raw-s"${SHARD_INDEX}"-*.tar.gz; do
            if [ -f "$f" ]; then tar xzf "$f" || true; fi
          done
      - name: Run shards until the budget
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          BUDGET="${{ inputs.time_budget_seconds || '18000' }}"
          SHARD_ASSET="cran-coverage-shard-${SHARD_INDEX}.db"
          PRIOR_ROWS=$(cat out/.prior_rows 2>/dev/null || echo 0)
          echo "partition ${SHARD_INDEX}/${SHARD_COUNT} | budget ${BUDGET}s | starting from ${PRIOR_ROWS} banked rows"
          # Publish this runner's shard DB to the INTERNAL prerelease after every
          # shard (including a failed one), so partial per-package progress is
          # never lost. Only this runner ever writes cran-coverage-shard-<i>.db,
          # so there is no cross-runner clobber; the merge job folds the shard
          # databases into the public canonical cran-coverage.db. The row-count
          # guard refuses to publish a DB smaller than the one we started from,
          # so a corrupted or truncated local DB can never overwrite banked
          # coverage. The raw covr tarballs are NOT uploaded here: they are large
          # and unchanged between iterations, and re-tarring plus re-uploading
          # ~27 partition assets every loop drained the per-repo API budget
          # (1,000 REST calls/hour) in minutes. They are bundled and uploaded
          # once, after the loop, by the block below.
          publish_db() {
            if [ -f out/cran-coverage.db ]; then
              NEW_ROWS=$(Rscript -e 'source("scripts/export.R"); cat(summary_row_count("out/cran-coverage.db"))' 2>/dev/null || echo 0)
              if [ "$NEW_ROWS" -gt 0 ] && [ "$NEW_ROWS" -ge "$PRIOR_ROWS" ]; then
                # gh treats file#name as a display LABEL, not the asset filename,
                # so copy to the target name before upload.
                cp -f out/cran-coverage.db "out/${SHARD_ASSET}"
                gh release upload "$INTERNAL_TAG" "out/${SHARD_ASSET}" --clobber || true
              else
                echo "refusing to publish shard DB: new rows ($NEW_ROWS) < prior rows ($PRIOR_ROWS); keeping the released shard"
              fi
            fi
          }
          fails=0
          # No-progress circuit breaker. `remaining` (never-done + under-cap
          # retryable units in this partition) must fall as shards complete. If
          # it does not decrease for NOPROGRESS_LIMIT consecutive shards, the
          # selection is stuck re-running the same units instead of advancing;
          # stop and let the next scheduled run resume rather than burning the
          # whole budget (and API) spinning. A generous limit so a legitimately
          # slow drain never trips it -- it only catches a genuine stall.
          NOPROGRESS_LIMIT=8
          noprogress=0
          prev_remain=""
          while :; do
            echo "=== shard ${SHARD_INDEX} (elapsed ${SECONDS}s) ==="
            if Rscript scripts/update.R out/; then
              fails=0
              publish_db
              REMAIN=$(jq -r '.remaining' out/manifest.json 2>/dev/null || echo 1)
              case "$REMAIN" in ''|*[!0-9]*) REMAIN=1 ;; esac
              if [ "$REMAIN" -eq 0 ]; then break; fi
              if [ -n "$prev_remain" ] && [ "$REMAIN" -ge "$prev_remain" ]; then
                noprogress=$((noprogress + 1))
                if [ "$noprogress" -ge "$NOPROGRESS_LIMIT" ]; then
                  echo "remaining stuck at ${REMAIN} for ${noprogress} shards; stopping this run, banked coverage is safe and the next scheduled run resumes"
                  break
                fi
              else
                noprogress=0
              fi
              prev_remain="$REMAIN"
            else
              # A shard runner can die when installing a package's dependencies via
              # apt/bspm replaces a loaded shared object (rlang.so and the like) mid
              # run. That is an intermittent environment hiccup, not a logic error.
              # Publish the partial progress, then retry once in a fresh process, which
              # loads the now-consistent library. If it keeps failing, stop this run
              # cleanly and let the next scheduled run resume from a fresh container.
              fails=$((fails + 1))
              echo "shard runner exited non-zero (attempt ${fails}); publishing partial progress and retrying in a fresh process"
              publish_db
              if [ "$fails" -ge 2 ]; then
                echo "repeated shard failure; stopping this run, banked coverage is safe and the next scheduled run starts fresh"
                break
              fi
            fi
            if [ "$SECONDS" -ge "$BUDGET" ]; then break; fi
          done
          # Bundle and upload this runner's raw covr objects ONCE, after the loop.
          # Moving this out of the per-iteration publish is the single largest cut
          # to API usage. Best-effort: the shard DB above already banked the
          # coverage numbers, so never fail the run over the secondary raw store.
          Rscript -e 'source("scripts/export.R"); bundle_partitions("out/raw", "out/bundle", prefix = paste0("covr-raw-s", Sys.getenv("SHARD_INDEX"), "-"))' || true
          for f in out/bundle/covr-raw-s"${SHARD_INDEX}"-*.tar.gz; do
            if [ -f "$f" ]; then gh release upload "$INTERNAL_TAG" "$f" --clobber || true; fi
          done

  # Fold the per-runner shard databases (from the internal prerelease) into the
  # canonical cran-coverage.db that consumers read on the public release, and
  # refresh the honest collection summary. Runs even if some matrix legs failed,
  # so whatever was collected is still merged.
  merge:
    needs: collect
    if: always()
    runs-on: ubuntu-latest
    # Pinned by digest, paired with PPM_SNAPSHOT (see the top-level env).
    container: rocker/r2u:noble@sha256:816279dd028627eef4c06416a25fb47f8943bab5f505f81510db55d5386667c5
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Merge dependencies from PPM
        run: |
          set -euo pipefail
          apt-get update -qq || true
          apt-get install -y --no-install-recommends gh jq libcurl4-openssl-dev libssl-dev
          # DBI/RSQLite/jsonlite from the pinned PPM snapshot (binaries matched to
          # this R), so the merge is not exposed to the rolling-image ABI drift.
          Rscript -e '
            source("scripts/config.R"); source("scripts/coverage.R")
            use_ppm_source()
            install.packages(c("DBI","RSQLite","jsonlite"))
            ok <- vapply(c("DBI","RSQLite","jsonlite"), requireNamespace, logical(1), quietly = TRUE)
            print(ok)
            if (!all(ok)) { cat("FAIL: a merge package did not install/load\n"); quit(status = 1) }
          '
      - name: Merge shard databases and publish the canonical database
        run: |
          set -uo pipefail
          mkdir -p shards
          # Distinguish "no shards exist yet" (fresh pipeline -> nothing to merge,
          # exit 0) from "shards exist but the download dropped some" (a transient
          # API error -> FATAL: proceeding would merge a partial set and the
          # PRIOR floor below could then let a shards-only, smaller DB clobber the
          # canonical). Count what actually exists on the internal release first.
          EXPECTED=$(gh release view "$INTERNAL_TAG" --json assets \
            -q '[.assets[].name | select(test("^cran-coverage-shard-.*\\.db$"))] | length')
          if [ -z "$EXPECTED" ]; then
            echo "could not list internal release assets (transient API error); aborting without publishing" >&2
            exit 1
          fi
          if [ "$EXPECTED" -eq 0 ]; then echo "no shard databases exist yet; nothing to merge"; exit 0; fi
          gh release download "$INTERNAL_TAG" --pattern 'cran-coverage-shard-*.db' --dir shards || true
          shopt -s nullglob
          files=(shards/cran-coverage-shard-*.db)
          if [ "${#files[@]}" -lt "$EXPECTED" ]; then
            echo "downloaded ${#files[@]} of ${EXPECTED} shard database(s) (partial fetch); aborting so a partial merge cannot clobber the canonical" >&2
            exit 1
          fi
          echo "merging ${#files[@]} shard database(s): ${files[*]}"
          # Start the merge FROM the current canonical (monotonic merge): the
          # shards are upserted onto it, so a failed or stale shard can never
          # drop rows or freeze recoveries -- only the packages a shard actually
          # carries are updated, the rest are preserved. PRIOR is the guard
          # floor: never publish fewer rows than the canonical already has. A
          # failed public-release read or a failed canonical download is FATAL,
          # not PRIOR=0: PRIOR=0 vacates the floor below and would let a partial
          # merge clobber the published database. PRIOR=0 is legitimate only when
          # the public release genuinely holds no canonical yet.
          if ! PUB_ASSETS=$(gh release view "$PUBLIC_TAG" --json assets -q '.assets[].name'); then
            echo "could not list public release assets (transient API error); aborting" >&2
            exit 1
          fi
          PRIOR=0
          if echo "$PUB_ASSETS" | grep -qx cran-coverage.db; then
            if ! gh release download "$PUBLIC_TAG" --pattern cran-coverage.db --dir prior; then
              echo "canonical exists but could not be downloaded (transient API error); aborting" >&2
              exit 1
            fi
            PRIOR=$(Rscript -e 'source("scripts/export.R"); cat(summary_row_count("prior/cran-coverage.db"))' 2>/dev/null || echo 0)
            if [ ! -f prior/cran-coverage.db ] || [ "$PRIOR" -le 0 ]; then
              echo "canonical downloaded empty/unreadable; aborting rather than seeding an empty merge base" >&2
              exit 1
            fi
            cp -f prior/cran-coverage.db out-cran-coverage.db
          fi
          # A crash in merge_shards (e.g. a fully-downloaded but corrupt or
          # schema-mismatched shard) exits the Rscript non-zero with no stdout.
          # Under `set -uo pipefail` (no -e) an unguarded `MERGED=$(...)` would
          # then be empty and fall into the low-row skip below, exiting 0 green
          # and freezing the canonical -- the same silent-green failure F5
          # eliminates elsewhere. Make the crash and any non-numeric output fatal.
          if ! MERGED=$(Rscript -e '
            source("scripts/export.R")
            shards <- list.files("shards", pattern = "^cran-coverage-shard-.*\\.db$", full.names = TRUE)
            n <- merge_shards(shards, "out-cran-coverage.db")
            cat(n)
          '); then
            echo "merge computation failed (merge_shards errored, likely a corrupt shard); aborting so the canonical is not silently frozen" >&2
            exit 1
          fi
          case "$MERGED" in
            ''|*[!0-9]*)
              echo "merge produced no numeric row count ('${MERGED}'); aborting rather than silently freezing the canonical" >&2
              exit 1 ;;
          esac
          echo "merged rows: ${MERGED} (prior canonical: ${PRIOR})"
          # Legitimate non-fatal skip: the merge SUCCEEDED but produced fewer rows
          # than the canonical already holds (a stale/regressed shard set).
          # Monotonic merge makes this unlikely, but if it happens keep the
          # published canonical rather than shrinking it; the next run re-merges.
          if [ "$MERGED" -le 0 ] || [ "$MERGED" -lt "$PRIOR" ]; then
            echo "refusing to publish merged DB (${MERGED} rows) over the prior canonical (${PRIOR} rows)"
            exit 0
          fi
          # gh's file#name is a display label, not a rename, so copy to the
          # target filename first. A failed publish is FATAL (surfaces as a red
          # run) rather than a silent green no-op: the shards are safe and the
          # next run retries, but a persistently frozen canonical must be visible.
          cp -f out-cran-coverage.db cran-coverage.db
          if ! gh release upload "$PUBLIC_TAG" cran-coverage.db --clobber; then
            echo "failed to upload the merged canonical (transient API error); shards are safe, the next run retries" >&2
            exit 1
          fi
      - name: Publish collection summary
        if: always()
        run: |
          set -uo pipefail
          if [ ! -f out-cran-coverage.db ]; then echo "no merged database; nothing to summarize"; exit 0; fi
          Rscript -e '
            for (s in c("config.R","sources.R","coverage.R","export.R","update.R")) source(file.path("scripts", s))
            suppressWarnings(suppressMessages({
              con <- open_db("out-cran-coverage.db")
              cs  <- DBI::dbGetQuery(con, "SELECT covr_status, line_pct, r_version, covr_version FROM coverage_summary")
              universe <- tryCatch({
                db <- available.packages(repos = "https://cloud.r-project.org")
                data.frame(package = rownames(db), latest_version = as.character(db[, "Version"]),
                           stringsAsFactors = FALSE)
              }, error = function(e) NULL)
              rank  <- popularity_rank("data/popularity.txt")
              remaining <- if (is.null(universe)) NA_integer_ else
                length(select_shard(universe, analyzed_state(con), .Machine$integer.max, rank = rank))
              DBI::dbDisconnect(con)
            }))
            total <- nrow(cs)
            ok <- sum(cs$covr_status == "ok", na.rm = TRUE)
            notests <- sum(cs$covr_status == "no_tests", na.rm = TRUE)
            failed <- total - ok - notests
            meas <- cs$line_pct[!is.na(cs$line_pct)]
            med <- if (length(meas)) round(stats::median(meas), 1) else NA
            mn  <- if (length(meas)) round(mean(meas), 1) else NA
            top <- function(x) { x <- x[!is.na(x)]; if (length(x)) names(sort(table(x), decreasing = TRUE))[1] else "n/a" }
            f <- function(n) if (is.na(n)) "n/a" else format(n, big.mark = ",")
            notes <- c(
              "Rolling database of CRAN latest-version test coverage, computed with covr under one consistent recipe.",
              "",
              sprintf("**%s packages** processed so far:", f(total)),
              sprintf("- **%s** with measured coverage", f(ok)),
              sprintf("- **%s** ship no test suite (nothing for covr to measure)", f(notests)),
              sprintf("- **%s** failed to build or test", f(failed)),
              "",
              sprintf("Line coverage of measured packages: median **%s%%**, mean **%s%%**.", med, mn),
              "",
              sprintf("**%s** package(s) still to collect (high-download packages first).", f(remaining)),
              "",
              sprintf("R %s | covr %s | updated %s UTC.", top(cs$r_version), top(cs$covr_version), format(Sys.time(), "%Y-%m-%d %H:%M", tz = "UTC")),
              "",
              "Assets: `cran-coverage.db` (SQLite) and `manifest.json`. Raw covr objects and per-runner shard state live on the `internal` prerelease."
            )
            writeLines(notes, "notes.md")
            man <- list(processed = total,
                        remaining = if (is.na(remaining)) NA else remaining,
                        generated_at = format(Sys.time(), "%Y-%m-%dT%H:%M:%SZ", tz = "UTC"))
            # Integrity/completeness core for the canonical published database
            # asset (cran-coverage.db). Prefer the fresh copy the merge step
            # published this run; if that step refused to publish (fewer rows
            # than the prior canonical), the prior canonical downloaded to
            # prior/cran-coverage.db remains the published asset. Both paths
            # have basename cran-coverage.db, so db_filename is always correct.
            db_pub <- if (file.exists("cran-coverage.db")) "cran-coverage.db" else
                      if (file.exists("prior/cran-coverage.db")) "prior/cran-coverage.db" else NA_character_
            if (!is.na(db_pub)) {
              man <- c(man, summary_integrity_core(db_pub, complete = coverage_complete(remaining)))
            }
            writeLines(jsonlite::toJSON(man, auto_unbox = TRUE, pretty = TRUE), "manifest.json")
          ' || { echo "collection summary generation failed; leaving release notes unchanged"; exit 0; }
          gh release edit "$PUBLIC_TAG" --notes-file notes.md || true
          if [ -f manifest.json ]; then gh release upload "$PUBLIC_TAG" manifest.json --clobber || true; fi
