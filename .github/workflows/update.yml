name: Update CRAN Coverage
on:
  workflow_dispatch:
    inputs:
      time_budget_seconds:
        description: "Stop starting new shards after this many seconds."
        default: "18000"
  schedule:
    # Every 6 hours: keep collecting, and relaunch soon after a run ends or a
    # job goes down. A run is budget-bounded (~5h) so runs do not overlap; the
    # collection is resumable, so each run picks up where the last one stopped.
    - cron: "0 */6 * * *"
concurrency:
  group: cran-coverage-update
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    container: rocker/r2u:noble
    timeout-minutes: 350
    env:
      GH_REPO: ${{ github.repository }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: System + R dependencies
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends git curl gh jq \
            r-cran-covr r-cran-testthat r-cran-dbi r-cran-rsqlite r-cran-jsonlite \
            r-cran-callr pkg-config libcurl4-openssl-dev libssl-dev libxml2-dev
      - name: Download the prior database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out out/raw
          if gh release view current >/dev/null 2>&1; then
            gh release download current --pattern cran-coverage.db --dir out || true
            mkdir -p out/rawbundles
            gh release download current --pattern 'covr-raw-*.tar.gz' --dir out/rawbundles || true
            for f in out/rawbundles/covr-raw-*.tar.gz; do
              if [ -f "$f" ]; then tar xzf "$f"; fi
            done
          fi
      - name: Run shards until the budget
        run: |
          set -uo pipefail
          BUDGET="${{ inputs.time_budget_seconds || '18000' }}"
          if ! GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release view current >/dev/null 2>&1; then
            GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release create current \
              --target "$GITHUB_SHA" \
              --title "CRAN Coverage (rolling)" \
              --notes "Latest-version test coverage for CRAN packages." --latest
          fi
          # Publish the rolling database and any raw-object tarballs. Called after
          # every shard, including a failed one, so partial per-package progress is
          # never lost. Each step is best-effort so publishing never aborts the run.
          publish() {
            if [ -f out/cran-coverage.db ]; then
              GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release upload current out/cran-coverage.db --clobber || true
            fi
            Rscript -e 'source("scripts/export.R"); bundle_partitions("out/raw", "out/bundle")' || true
            for f in out/bundle/covr-raw-*.tar.gz; do
              if [ -f "$f" ]; then GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release upload current "$f" --clobber || true; fi
            done
          }
          fails=0
          while :; do
            echo "=== shard (elapsed ${SECONDS}s) ==="
            if Rscript scripts/update.R out/; then
              fails=0
              publish
              REMAIN=$(jq -r '.remaining' out/manifest.json 2>/dev/null || echo 1)
              if [ "$REMAIN" = "0" ]; then break; fi
            else
              # A shard runner can die when installing a package's dependencies via
              # apt/bspm replaces a loaded shared object (rlang.so and the like) mid
              # run. That is an intermittent environment hiccup, not a logic error.
              # Publish the partial progress, then retry once in a fresh process, which
              # loads the now-consistent library. If it keeps failing, stop this run
              # cleanly and let the next scheduled run resume from a fresh container.
              fails=$((fails + 1))
              echo "shard runner exited non-zero (attempt ${fails}); publishing partial progress and retrying in a fresh process"
              publish
              if [ "$fails" -ge 2 ]; then
                echo "repeated shard failure; stopping this run, banked coverage is safe and the next scheduled run starts fresh"
                break
              fi
            fi
            if [ "$SECONDS" -ge "$BUDGET" ]; then break; fi
          done

      - name: Publish collection summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f out/cran-coverage.db ]; then echo "no database yet; nothing to summarize"; exit 0; fi
          Rscript --vanilla -e '
            suppressMessages(library(DBI))
            con <- dbConnect(RSQLite::SQLite(), "out/cran-coverage.db")
            cs <- dbGetQuery(con, "SELECT covr_status, line_pct, r_version, covr_version FROM coverage_summary")
            dbDisconnect(con)
            total <- nrow(cs)
            ok <- sum(cs$covr_status == "ok", na.rm = TRUE)
            notests <- sum(cs$covr_status == "no_tests", na.rm = TRUE)
            failed <- total - ok - notests
            meas <- cs$line_pct[!is.na(cs$line_pct)]
            med <- if (length(meas)) round(stats::median(meas), 1) else NA
            mn  <- if (length(meas)) round(mean(meas), 1) else NA
            man <- tryCatch(jsonlite::fromJSON("out/manifest.json"), error = function(e) list(processed = NA, remaining = NA))
            top <- function(x) { x <- x[!is.na(x)]; if (length(x)) names(sort(table(x), decreasing = TRUE))[1] else "n/a" }
            f <- function(n) if (is.na(n)) "n/a" else format(n, big.mark = ",")
            notes <- c(
              "Rolling database of CRAN latest-version test coverage, computed with covr under one consistent recipe.",
              "",
              sprintf("**%s packages** processed so far:", f(total)),
              sprintf("- **%s** with measured coverage", f(ok)),
              sprintf("- **%s** ship no test suite (nothing for covr to measure)", f(notests)),
              sprintf("- **%s** failed to build or test", f(failed)),
              "",
              sprintf("Line coverage of measured packages: median **%s%%**, mean **%s%%**.", med, mn),
              "",
              sprintf("Most recent run processed **%s** package(s); **%s** still to collect.", f(man$processed), f(man$remaining)),
              "",
              sprintf("R %s | covr %s | updated %s UTC.", top(cs$r_version), top(cs$covr_version), format(Sys.time(), "%Y-%m-%d %H:%M", tz = "UTC")),
              "",
              "Assets: `cran-coverage.db` (SQLite), `covr-raw-*.tar.gz` (raw covr objects), `manifest.json` (latest run status)."
            )
            writeLines(notes, "notes.md")
          '
          gh release edit current --notes-file notes.md || true
          if [ -f out/manifest.json ]; then gh release upload current out/manifest.json --clobber || true; fi
