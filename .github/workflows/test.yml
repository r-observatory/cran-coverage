name: Test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    container: rocker/r2u:noble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install R deps + covr
        run: |
          set -euo pipefail
          # r2u can be transiently unreachable; tolerate a stale index. The
          # rolling image can also carry an rlang built against an older R whose
          # .so fails to resolve SETLENGTH under the current R, so bring the base
          # stack current and force-reinstall rlang so its binary matches.
          apt-get update -qq || true
          apt-get -y dist-upgrade || true
          apt-get install -y --no-install-recommends r-cran-covr r-cran-testthat \
            r-cran-dbi r-cran-rsqlite r-cran-jsonlite r-cran-callr \
            pkg-config libcurl4-openssl-dev libssl-dev
          # pkgdepends is r2u-only; best-effort so a transient r2u outage does
          # not fail the job (the sysreqs tests skip when it is absent).
          apt-get install -y --no-install-recommends r-cran-pkgdepends \
            || echo "r-cran-pkgdepends unavailable; sysreqs tests will skip"
          # Rebuild any compiled package the rolling image built against a
          # different R ABI (undefined symbol SETLENGTH) from source against this R.
          Rscript -e '
            compiled <- Filter(function(p) {
              d <- system.file("libs", package = p)
              nzchar(d) && length(list.files(d, pattern = "[.]so$")) > 0L
            }, rownames(installed.packages()))
            broken <- Filter(function(p) !isTRUE(tryCatch({loadNamespace(p); TRUE},
                             error = function(e) FALSE)), compiled)
            if (length(broken)) {
              # C++ header packages (cpp11, Rcpp, ...) do not fail to load -- they
              # are header-only, or their .so loads fine -- but their installed
              # headers can still reference a removed R symbol (SETLENGTH), which
              # breaks the source rebuild of everything that LinkingTo them.
              # Refresh those headers first so the dependents can compile.
              hdr <- intersect(c("cpp11", "Rcpp", "RcppEigen", "RcppArmadillo"),
                               rownames(installed.packages()))
              message("rebuilding ABI-mismatched packages from source: ",
                      paste(unique(c(hdr, broken)), collapse = " "))
              if (length(hdr)) install.packages(hdr, repos = "https://cloud.r-project.org", type = "source")
              install.packages(broken, repos = "https://cloud.r-project.org", type = "source")
            } else message("compiled stack OK")
          ' || true
      - name: Run unit tests
        run: Rscript tests/testthat.R
