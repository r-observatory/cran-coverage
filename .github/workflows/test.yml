name: Test
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    container: rocker/r2u:noble
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install R deps + covr
        run: |
          set -euo pipefail
          # r2u can be transiently unreachable; tolerate a stale index. The
          # rolling image can also carry an rlang built against an older R whose
          # .so fails to resolve SETLENGTH under the current R, so bring the base
          # stack current and force-reinstall rlang so its binary matches.
          apt-get update -qq || true
          apt-get -y dist-upgrade || true
          apt-get install -y --no-install-recommends r-cran-covr r-cran-testthat \
            r-cran-dbi r-cran-rsqlite r-cran-jsonlite r-cran-callr \
            pkg-config libcurl4-openssl-dev libssl-dev
          # pkgdepends is r2u-only; best-effort so a transient r2u outage does
          # not fail the job (the sysreqs tests skip when it is absent).
          apt-get install -y --no-install-recommends r-cran-pkgdepends \
            || echo "r-cran-pkgdepends unavailable; sysreqs tests will skip"
          apt-get install -y --reinstall r-cran-rlang || true
      - name: Run unit tests
        run: Rscript tests/testthat.R
